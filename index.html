<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iKnow Procurement</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0px 5px 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:20px;
padding:15px 30px;
background:#8B0000;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#a80000;
}

#answer{
margin-top:30px;
padding:20px;
background:#f0f0f0;
border-radius:10px;
}

.footer{
margin-top:50px;
text-align:center;
color:#666;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>iKnow Procurement</h1>

<p>AI Knowledge Assistant for Government Procurement</p>

</header>

<div class="container">

<div class="card">

<h2>Smart Procurement Search</h2>

<p>Tanya apa sahaja berkaitan tatacara perolehan.</p>

<input id="question"
placeholder="Contoh: Had kuasa Lembaga Perolehan Kementerian">

<button onclick="askAI()">

TANYA

</button>

<div id="answer">

Jawapan akan dipaparkan di sini.

</div>

</div>

</div>

<div class="footer">

Version 1.0

</div>

<script>

function askAI(){

let q=document.getElementById("question").value;

document.getElementById("answer").innerHTML=

"<b>Soalan:</b> "+q+

"<br><br>Versi AI akan dibina pada langkah seterusnya.";

}

</script>

</body>
</html>
